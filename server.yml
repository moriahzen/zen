#   Simple Tailscale


name: Tailscale Server For Work Purpose
on:
  workflow_dispatch: {}  # Manual trigger only
  
jobs:
  run-tailscale:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub will kill after 6 hours

    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Enable IP Forwarding
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1

      - name: Start Tailscale
        run: |
          sudo tailscale up \
            --authkey ${{ secrets.TAILSCALE_AUTHKEY }} \
            --ssh \
            --advertise-exit-node \
            --hostname=git-leech \
            --reset
              
      - name: Show Connection Info
        run: |
          echo "========================================"
          echo "✅ Tailscale Server Active"
          echo "========================================"
          echo "Hostname: git-server"
          echo "IP Address: $(tailscale ip -4)"
          echo "Started at: $(date)"
          echo "Will run until: $(date -d '+6 hours')"
          echo "========================================"
      
##############################   Docker Build + Run  ######################

      - name: Clone Repo
        run: |
          git clone https://github.com/surya123-s/Docker-Leech.git
          cd Docker-Leech
          echo "repo_cloned=true" >> $GITHUB_ENV

      - name: Build Docker Image
        if: env.repo_cloned == 'true'
        run: |
          cd Docker-Leech
          docker build -t cyber .

      - name: Run Docker Container
        if: env.repo_cloned == 'true'
        run: |
          mkdir -p ./cfg ./tools/linux/ffmpeg/x64
          docker run -d \
            --name cyber-container \
            -p 80:80 \
            -p 3129:3129 \
            -p 8080:8080 \
            -p 8090:8090 \
            -v ${{ github.workspace }}/cfg:/opt/JDownloader/cfg \
            -v ${{ github.workspace }}/tools:/JDownloader/tools \
            -e BOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
            -e OWNER_ID="${{ secrets.OWNER_ID }}" \
            -e TELEGRAM_API="${{ secrets.TELEGRAM_API }}" \
            -e LEECH_DUMP_CHAT="${{ secrets.LEECH_DUMP_CHAT }}" \
            -e TELEGRAM_HASH="${{ secrets.TELEGRAM_HASH }}" \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            cyber

      - name: Show Logs
        run: docker logs cyber-container || true

####################### Leech end #######################

      - name: Keep Alive for 6 Hours
        run: |
          echo "🟢 Server is running - GitHub will auto-terminate in 6 hours"
          echo "📍 Press Ctrl+C if running locally to stop"
          echo ""
          
          # Simple countdown
          for i in {360..1}; do
            HOURS=$((i / 60))
            MINUTES=$((i % 60))
            echo -ne "\r\033[K⏱️  Time remaining: ${HOURS}h ${MINUTES}m | 🌐 Status: $(tailscale status --json | jq -r '.Self.Online')"
            sleep 60  # Update every minute
          done
          
          echo ""
          echo "⏰ 6 hours completed - waiting for GitHub termination..."
          sleep infinity

      - name: Cleanup
        if: always()
        run: |
          sudo tailscale down
