name: Tailscale With Docker (Fixed)

on:
  workflow_dispatch: {}

jobs:
  run-tailscale:
    runs-on: ubuntu-latest

    steps:
      - name: Install Tailscale + jq
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Enable IP Forwarding
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1

      - name: Get Runner Hostname
        id: runner_info
        run: |
          UNIQUE_HOSTNAME="runner-${GITHUB_RUN_ID}"
          echo "runner_hostname=$UNIQUE_HOSTNAME" >> $GITHUB_OUTPUT

      - name: Start Tailscale Exit Node
        run: |
          sudo tailscale up \
            --authkey ${{ secrets.TAILSCALE_AUTHKEY }} \
            --ssh \
            --advertise-exit-node \
            --hostname ${{ steps.runner_info.outputs.runner_hostname }} \
            --reset
        env:
          TS_SOCKET: /tmp/tailscaled.sock

      - name: Clone and Build
        run: |
          git clone https://github.com/surya123-s/Docker-Leech.git
          cd Docker-Leech
          docker build -t cyber .

      - name: Run Bot and Notification Loop
        run: |
          # 1. Start Docker in Detached mode with Host Networking
          # Host networking ensures the bot uses the Tailscale IP/DNS correctly
          docker run -d \
            --name cyber-container \
            --network host \
            -e BOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
            -e OWNER_ID="${{ secrets.OWNER_ID }}" \
            -e TELEGRAM_API="${{ secrets.TELEGRAM_API }}" \
            -e LEECH_DUMP_CHAT="${{ secrets.LEECH_DUMP_CHAT }}" \
            -e TELEGRAM_HASH="${{ secrets.TELEGRAM_HASH }}" \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            cyber

          # 2. Start the Telegram Status Loop in the BACKGROUND
          (
            START_TIME=$(date +%s)
            
            # Initial Message
            MSG="🚀 Bot & Tailscale Online%0A🖥️ Runner: ${{ steps.runner_info.outputs.runner_hostname }}"
            RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
              -d chat_id=${{ secrets.TG_CHAT_ID }} \
              -d text="$MSG")
            MESSAGE_ID=$(echo $RESPONSE | jq -r '.result.message_id')

            # Loop for 6 hours
            while [ $(($(date +%s) - $START_TIME)) -lt 21600 ]; do
              ELAPSED=$(($(date +%s) - $START_TIME))
              PROGRESS=$((ELAPSED * 100 / 21600))
              
              # Update status message every 60 seconds (better for API limits)
              UPDATE_MSG="✅ Bot Running...%0A⏱️ Uptime: $((ELAPSED/3600))h $(((ELAPSED%3600)/60))m%0A📊 Progress: $PROGRESS%"
              
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/editMessageText" \
                -d chat_id=${{ secrets.TG_CHAT_ID }} \
                -d message_id=$MESSAGE_ID \
                -d text="$UPDATE_MSG"
              
              sleep 60
            done
          ) &

          # 3. Follow Docker logs in the FOREGROUND
          # This keeps the GitHub Action alive and lets you see bot errors
          docker logs -f cyber-container

      - name: Cleanup
        if: always()
        run: |
          sudo tailscale down
          docker stop cyber-container || true
