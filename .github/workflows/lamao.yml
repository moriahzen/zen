name: Tailscale With Docker (Fixed)

on:
  workflow_dispatch: {}

jobs:
  run-tailscale:
    runs-on: ubuntu-latest

    steps:
      - name: Install Tailscale + jq
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Enable IP Forwarding
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1

      - name: Get Runner Hostname
        id: runner_info
        run: |
          UNIQUE_HOSTNAME="runner-${GITHUB_RUN_ID}"
          echo "runner_hostname=$UNIQUE_HOSTNAME" >> $GITHUB_OUTPUT

      - name: Start Tailscale Exit Node
        run: |
          sudo tailscale up \
            --authkey ${{ secrets.TAILSCALE_AUTHKEY }} \
            --ssh \
            --advertise-exit-node \
            --hostname ${{ steps.runner_info.outputs.runner_hostname }} \
            --reset
        env:
          TS_SOCKET: /tmp/tailscaled.sock

      - name: Clone, Patch, and Build
        run: |
          git clone https://github.com/surya123-s/Docker-Leech.git
          cd Docker-Leech
          
          # -------------------------------------------------------------
          # HOTFIX: Manually inject the Python 3.13 Event Loop Fix 
          # directly into the bot's source code before building the image.
          # -------------------------------------------------------------
          echo "Patching Python code to support Python 3.13..."
          
          if [ -f "bot/__init__.py" ]; then
            echo "import asyncio" > temp_fix.py
            echo "asyncio.set_event_loop(asyncio.new_event_loop())" >> temp_fix.py
            cat bot/__init__.py >> temp_fix.py
            mv temp_fix.py bot/__init__.py
            echo "✅ Successfully patched bot/__init__.py!"
          else
            echo "⚠️ bot/__init__.py not found, skipping patch."
          fi
          
          docker build -t cyber .

      - name: Keep Alive for 6 Hours
        run: |
          echo "🟢 Server is running - GitHub will auto-terminate in 6 hours"
          echo "📍 Press Ctrl+C if running locally to stop"
          echo ""
          
          # Simple countdown
          for i in {360..1}; do
            HOURS=$((i / 60))
            MINUTES=$((i % 60))
            echo -ne "\r\033[K⏱️  Time remaining: ${HOURS}h ${MINUTES}m | 🌐 Status: $(tailscale status --json | jq -r '.Self.Online')"
            sleep 60  # Update every minute
          done
          
          echo ""
          echo "⏰ 6 hours completed - waiting for GitHub termination..."
          sleep infinity


      - name: Cleanup
        if: always()
        run: |
          sudo tailscale down
          docker stop cyber-container || true
